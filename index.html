<!DOCTYPE html>
<html>
<head>
  <title>IQOOPlayZz Login</title>

  <script type="module">

    // Firebase Import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    // 🔴 तुझा Firebase Config (तू दिलेला)
    const firebaseConfig = {
      apiKey: "AIzaSyAMDsluMrIf0MasRLs30ZGU_zZPiorfL9Q",
      authDomain: "iqooplayzz-e33a6.firebaseapp.com",
      projectId: "iqooplayzz-e33a6",
      storageBucket: "iqooplayzz-e33a6.firebasestorage.app",
      messagingSenderId: "198175037767",
      appId: "1:198175037767:web:bf87abcf2b68ad07c45462"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Login Function
    window.login = function () {

      let key = document.getElementById("key").value;

      if (key === "") {
        alert("Key टाक भाऊ!");
        return;
      }

      const keyRef = ref(db, "keys/" + key);

      get(keyRef).then((snapshot) => {

        if (snapshot.exists()) {

          alert("Login Success ✅");
          window.location.href = "loader.html";

        } else {

          alert("Wrong Key ❌");

        }

      });

    }

  </script>

</head>

<body style="background:black;color:red;text-align:center;font-family:sans-serif">

  <h1>🔥 IQOOPlayZz Booster 🔥</h1>

  <br><br>

  <input id="key" placeholder="Enter Your Key"
    style="padding:10px;width:200px"><br><br>

  <button onclick="login()"
    style="padding:10px 30px;background:red;color:white;border:none">
    LOGIN
  </button>

</body>
</html>
